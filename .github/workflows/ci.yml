name: CI

# Remote enforcement backstop for the defence loop. Local pre-commit (scripts/git-hooks/pre-commit)
# and `dotnet format` can be bypassed with --no-verify or simply not installed; CI is the layer that
# does not depend on anyone's memory. Set this workflow as a required status check on main so a red
# build blocks merge.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest  # Docker is preinstalled — FunctionalTests use Testcontainers (Postgres).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Identical gate to the local pre-commit hook — both run scripts/ci-checks.sh,
      # so "passed locally" and "passed CI" cannot diverge.
      - name: Run CI gate (scripts/ci-checks.sh)
        run: bash scripts/ci-checks.sh
