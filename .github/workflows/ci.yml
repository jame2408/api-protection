name: CI

# Post-push verification signal for the defence loop (docs/adr/adr-012-charter-amendments-external-adoption.md
# decision (e)): trunk-based direct push to main; the primary gate is the local pre-push full run of
# scripts/ci-checks.sh, and CI re-runs the same script as the layer that does not depend on anyone's
# memory. main's required status check was deliberately removed (ADR-012, Alternative E rejected);
# a red CI run on main means fix-forward immediately, not a blocked merge.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest  # Docker is preinstalled — FunctionalTests use Testcontainers (Postgres).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Identical gate to the local pre-push hook — both run `ci-checks.sh full`,
      # so "passed pre-push locally" and "passed CI" cannot diverge.
      - name: Run CI gate (scripts/ci-checks.sh full)
        run: bash scripts/ci-checks.sh full
